<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intersite Track Trello Power-Up</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        max-width: 640px;
        padding: 32px;
        border: 1px solid #334155;
        border-radius: 16px;
        background: #111827;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin-top: 0;
        font-size: 28px;
      }

      p {
        line-height: 1.6;
        color: #cbd5e1;
      }

      code {
        background: #1e293b;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Intersite Track Trello Power-Up</h1>
      <p>
        This is a minimal public placeholder page for Trello Power-Up registration.
      </p>
      <p>
        It exists so Trello can store a valid <code>Iframe connector URL</code>
        while the project uses Trello REST API credentials for automation scripts.
      </p>
    </main>
  </body>
</html>
